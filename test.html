      background: #ffffff;

    }

    .btn-primary {
      border-color: #2563eb;
      background: #2563eb;
      color: #fff;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

      opacity: 0.45;
      cursor: default;
      background: #e5e7eb;
      border-color: #e5e7eb;
      color: #9ca3af;
    }

    .audio-wrapper {

      color: #9ca3af;

      margin-bottom: 12px;
    }

    .voice-transcript-label {
      display: block;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .voice-transcript-input {
      width: 100%;
      font-size: 15px;
      line-height: 1.5;
      padding: 10px 12px;
      border: 1px solid #d0d3e0;
      border-radius: 8px;
      background: #f8fafc;
      color: #222;
      resize: vertical;
      box-sizing: border-box;
    }

    .voice-transcript-input:focus {
      outline: none;
      border-color: #2563eb;
      background: #fff;
    }

    .sentence {
      font-size: 16px;
      line-height: 1.6;
      margin: 10px 0 12px;
    }

    .blank-input {
      width: 90px;
      padding: 3px 4px;
      margin: 0 2px;
      border-radius: 6px;
      border: 1px solid #d0d3e0;
      font-size: 15px;
    }

    .blank-input.correct {
      border-color: #16a34a;
      background: #ecfdf3;
    }

    .blank-input.incorrect {
      border-color: #dc2626;
      background: #fef2f2;
    }

    .blank-input.shown-answer {
      border-color: #6b7280;
      background: #f3f4f6;
      color: #374151;
      cursor: pointer;
    }

    .blank-input.shown-answer:hover {
      background: #e5e7eb;
      text-decoration: underline;
    }

      margin: 0 2px;
      border-radius: 6px;

      text-decoration: underline;

    }

    .feedback.incorrect {

    }

      gap: 8px;

      justify-content: center;

      font-size: 16px;

<body>
  <h1>Listen & Repeat</h1>
  <div class="subtitle">
    选择句型 → 听整段音频 → 翻转看到挖空句子 → 全对进入下一句；同一句错 3 次将显示答案并计入错题本，完成本组后可查看正确率与错题记录
  </div>

  <div class="audio-wrapper">
    <div id="group-list" class="group-list"></div>
    <div class="top-bar">
      <div>
        <div class="progress" id="progress-text">进度：1 / 10</div>
        <div id="group-label" style="font-size:12px;color:#6b7280;margin-top:2px;"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button id="pause-toggle" class="btn">暂停练习</button>
        <span style="font-size:12px;color:#6b7280;">使用下方进度条暂停 / 倒退</span>
      </div>
    </div>
    <audio id="group-audio" controls>
      您的浏览器不支持 audio 标签。
    </audio>
  </div>

  <div class="card">
    <div class="sentence-title" id="sentence-title">第 1 句</div>
    <div class="sentence-plain sentence-hidden" id="plain-sentence">
      先听音频，然后选择「语音输入」说出整句（可编辑后检查）或「填空」按挖空填写，二选一即可；各有 3 次对答案机会，答案正确或 3 次后均可点击单词查词。
    </div>
    <div id="voice-transcript-wrap" class="voice-transcript-wrap" style="display:none;">
      <label class="voice-transcript-label">您说的（可编辑）：</label>
      <textarea id="voice-transcript" class="voice-transcript-input" rows="3" placeholder="点击「语音输入」说出句子后可在此修改"></textarea>
    </div>
    <div class="sentence" id="sentence-container" style="display:none;"></div>

    <div class="feedback" id="feedback"></div>

    <div class="actions">
      <button id="voice-btn" class="btn">🎤 语音输入</button>
      <button id="blanks-btn" class="btn btn-primary">填空</button>
      <button id="check-btn" class="btn" disabled>检查本句</button>
      <button id="next-btn" class="btn" disabled>下一句 ▶</button>
      <button id="redo-btn" class="btn" disabled>清空本句</button>
    </div>
    <p class="voice-hint" style="font-size:12px;color:#6b7280;margin-top:6px;">语音输入或填空二选一完成本句；正确或 3 次后均可点击句中单词线上查词。</p>
  </div>

  <div class="pause-overlay" id="pause-overlay">
    <div class="pause-box">
      <div class="pause-title">练习已暂停</div>
      <div class="pause-text">
        音频已暂停。准备好了再继续练习。
      </div>
      <button id="resume-btn" class="btn btn-primary">继续练习</button>
    </div>
  </div>

  <div class="results-overlay" id="results-overlay">
    <div class="results-box">
      <div class="results-title" id="results-title">本组练习结果</div>
      <div class="results-stats" id="results-stats"></div>
      <div class="results-errors-title" id="results-errors-title">错题记录</div>
      <div class="results-errors-list" id="results-errors-list"></div>
      <button id="results-close-btn" class="btn btn-primary" style="width:100%;">关闭并继续练习</button>
    </div>
  </div>

    const pauseOverlay = document.getElementById('pause-overlay');
    const resumeBtn = document.getElementById('resume-btn');

    let currentGroupIndex = 0;
    let currentSentenceIndex = 0;
    let hasPlayedSinceReset = false;
    let wrongCountCurrentSentence = 0;
    /** 当前句练习方式：'none' | 'voice'（整句语音可编辑）| 'blanks'（填空） */
    let exerciseMode = 'none';
    /** 错题本：本组练习中错满 3 次的句子 */
    let errorBook = [];
    /** 本组统计：已完成句数、正确通过句数（用于正确率） */
    let groupSessionAttempted = 0;
    let groupSessionCorrect = 0;

    // 渲染顶部的分组按钮
    function renderGroupButtons() {
      groupListEl.innerHTML = '';
      groups.forEach(function(group, index) {
        const btn = document.createElement('button');
        btn.className = 'group-btn' + (index === currentGroupIndex ? ' active' : '');
        btn.textContent = group.id;
        btn.title = group.label;
        btn.addEventListener('click', function() {
          if (currentGroupIndex === index) return;
          currentGroupIndex = index;
          currentSentenceIndex = 0;
          applyCurrentGroup();
          renderGroupButtons();
        });
        groupListEl.appendChild(btn);
      });
    }

    function getCurrentGroup() {
      return groups[currentGroupIndex];
    }

    function updateProgress() {
      const group = getCurrentGroup();
      const total = group.sentences.length;
      progressText.textContent = '进度：' + (currentSentenceIndex + 1) + ' / ' + total;
      sentenceTitle.textContent = '第 ' + (currentSentenceIndex + 1) + ' 句';
      groupLabelEl.textContent = group.label;
    }

    function resetSentenceView() {
      plainSentence.classList.remove('sentence-hidden');
      plainSentence.textContent = '先听音频，然后选择「语音输入」说出整句（可编辑后检查）或「填空」按挖空填写，二选一即可；各有 3 次对答案机会，答案正确或 3 次后均可点击单词查词。';
      sentenceContainer.style.display = 'none';
      sentenceContainer.innerHTML = '';
      voiceTranscriptWrap.style.display = 'none';
      voiceTranscriptEl.value = '';
      feedbackEl.textContent = '';
      feedbackEl.className = 'feedback';
      blanksBtn.disabled = true;
      voiceBtn.disabled = true;
      checkBtn.disabled = true;
      nextBtn.disabled = true;
      redoBtn.disabled = true;
      hasPlayedSinceReset = false;
      wrongCountCurrentSentence = 0;
      exerciseMode = 'none';
    }

    /** 将整句渲染为可点击查词的单词（正确或 3 次后均可用） */
    function renderSentenceAsClickableWords(sentenceText) {
      if (!sentenceText) return;
      sentenceContainer.innerHTML = '';
      var words = sentenceText.split(' ');
      words.forEach(function(raw) {
        var clean = raw.replace(/[.,!?]/g, '');
        var span = document.createElement('span');
        span.className = 'word-link';
        span.textContent = clean || raw;
        span.title = '点击查词';
        span.addEventListener('click', function() {
          var w = (clean || raw).trim();
          if (w) {
            window.open('https://dict.cn/search?q=' + encodeURIComponent(w), '_blank', 'noopener');
          }
        });
        sentenceContainer.appendChild(span);
        sentenceContainer.appendChild(document.createTextNode(' '));
      });
      sentenceContainer.style.display = 'block';
      voiceTranscriptWrap.style.display = 'none';
      checkBtn.disabled = true;
      redoBtn.disabled = true;
      voiceBtn.disabled = true;
      blanksBtn.disabled = true;
    }

    /** 将当前句加入错题本 */
    function addCurrentToErrorBook() {
      const group = getCurrentGroup();
      const sentenceText = group.sentences[currentSentenceIndex];
      errorBook.push({
        groupId: group.id,
        groupLabel: group.label,
        sentenceIndex: currentSentenceIndex + 1,
        sentenceText: sentenceText
      });
    }

    function renderCurrentSentence() {
      const group = getCurrentGroup();
      const text = group.sentences[currentSentenceIndex];
      const words = text.split(' ');
      sentenceContainer.innerHTML = '';

      words.forEach(function(raw) {
        const clean = raw.replace(/[.,!?]/g, '');
        const lower = clean.toLowerCase();

        if (keepWords.has(lower) || !clean) {
          const span = document.createElement('span');
          span.textContent = raw + ' ';
          sentenceContainer.appendChild(span);
        } else {
          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'blank-input';
          input.dataset.answer = clean.toLowerCase();
          sentenceContainer.appendChild(input);
          sentenceContainer.appendChild(document.createTextNode(' '));
        }
      });

      sentenceContainer.style.display = 'block';
      plainSentence.textContent = '请根据听力填写空格（可语音或键盘输入）。';
      checkBtn.disabled = false;
      redoBtn.disabled = false;
    }

    // 语音输入：识别结果填入当前焦点空格或第一个空格
    (function setupVoiceInput() {
      var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        voiceBtn.disabled = true;
        voiceBtn.title = '当前浏览器不支持语音识别';
        return;
      }
      var recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'en-US';

      voiceBtn.addEventListener('click', function() {
        var inputs = sentenceContainer.querySelectorAll('.blank-input:not([disabled])');
        // 未选填空时：语音输入整句，可编辑后直接检查
        if (inputs.length === 0) {
          recognition.onresult = function(event) {
            var transcript = (event.results[0] && event.results[0][0]) ? event.results[0][0].transcript : '';
            if (transcript) {
              voiceTranscriptEl.value = transcript;
              voiceTranscriptWrap.style.display = 'block';
              plainSentence.classList.add('sentence-hidden');
              exerciseMode = 'voice';
              checkBtn.disabled = false;
              redoBtn.disabled = false;
              blanksBtn.disabled = true; // 已选语音路径，本句不再切填空
            }
          };
          recognition.onerror = function() {
            feedbackEl.textContent = '语音识别未成功，请重试。';
            feedbackEl.className = 'feedback';
          };
          recognition.start();
          feedbackEl.textContent = '正在听… 请说出你听到的句子。';
          feedbackEl.className = 'feedback';
          return;
        }
        // 已选填空：语音填入当前焦点空格或第一个空格
        var target = document.activeElement;
        if (!target || !target.classList || !target.classList.contains('blank-input')) {
          target = inputs[0];
        }
        var targetInput = target;
        recognition.onresult = function(event) {
          var transcript = (event.results[0] && event.results[0][0]) ? event.results[0][0].transcript : '';
          if (transcript && targetInput) {
            targetInput.value = transcript.trim();
            targetInput.dispatchEvent(new Event('input', { bubbles: true }));
          }
        };
        recognition.onerror = function() {
          feedbackEl.textContent = '语音识别未成功，请重试。';
          feedbackEl.className = 'feedback';
        };
        recognition.start();
        feedbackEl.textContent = '正在听… 请说出要填的单词。';
        feedbackEl.className = 'feedback';
      });
    })();

    blanksBtn.addEventListener('click', function() {
      if (!hasPlayedSinceReset) return;
      exerciseMode = 'blanks';
      renderCurrentSentence();
      plainSentence.classList.add('sentence-hidden');
      blanksBtn.disabled = true;
      voiceBtn.disabled = true; // 已选填空路径，本句不再切语音整句
      checkBtn.disabled = false;
    });

    function normalizeForCompare(s) {
      return (s || '').toLowerCase().trim().replace(/\s+/g, ' ').replace(/[.,!?]/g, '');
    }

    checkBtn.addEventListener('click', function() {
      var group = getCurrentGroup();
      var correctSentence = group.sentences[currentSentenceIndex];

      if (exerciseMode === 'voice') {
        var userText = normalizeForCompare(voiceTranscriptEl.value);
        var correctNormalized = normalizeForCompare(correctSentence);
        if (userText === correctNormalized) {
          groupSessionCorrect++;
          groupSessionAttempted++;
          feedbackEl.textContent = '✅ 全部正确，可点击句中单词查词，然后进入下一句。';
          feedbackEl.className = 'feedback correct';
          nextBtn.disabled = false;
          renderSentenceAsClickableWords(correctSentence);
          return;
        }
        wrongCountCurrentSentence++;
        if (wrongCountCurrentSentence >= 3) {
          addCurrentToErrorBook();
          groupSessionAttempted++;
          feedbackEl.textContent = '已错 3 次，已显示答案并计入错题本，可点击单词查词后进入下一句。';
          feedbackEl.className = 'feedback incorrect';
          nextBtn.disabled = false;
          renderSentenceAsClickableWords(correctSentence);
        } else {
          feedbackEl.textContent = '与答案不一致（错误 ' + wrongCountCurrentSentence + ' / 3 次，满 3 次将显示答案）。';
          feedbackEl.className = 'feedback incorrect';
          nextBtn.disabled = true;
        }
        return;
      }

      if (exerciseMode === 'blanks') {
        var inputs = sentenceContainer.querySelectorAll('.blank-input');
        if (inputs.length === 0) {
          feedbackEl.textContent = '本句没有需要填写的空。';
          feedbackEl.className = 'feedback';
          nextBtn.disabled = false;
          return;
        }
        var correctCount = 0;
        inputs.forEach(function(input) {
          var user = input.value.trim().toLowerCase();
          var ans = input.dataset.answer;
          input.classList.remove('correct', 'incorrect');
          if (!user) return;
          if (user === ans) {
            input.classList.add('correct');
            correctCount++;
          } else {
            input.classList.add('incorrect');
          }
        });
        if (correctCount === inputs.length) {
          groupSessionCorrect++;
          groupSessionAttempted++;
          feedbackEl.textContent = '✅ 全部正确，可点击句中单词查词，然后进入下一句。';
          feedbackEl.className = 'feedback correct';
          nextBtn.disabled = false;
          renderSentenceAsClickableWords(correctSentence);
        } else {
          wrongCountCurrentSentence++;
          if (wrongCountCurrentSentence >= 3) {
            addCurrentToErrorBook();
            groupSessionAttempted++;
            feedbackEl.textContent = '已错 3 次，已显示答案并计入错题本，可点击单词查词后进入下一句。';
            feedbackEl.className = 'feedback incorrect';
            nextBtn.disabled = false;
            renderSentenceAsClickableWords(correctSentence);
          } else {
            feedbackEl.textContent = '已答对 ' + correctCount + ' / ' + inputs.length + ' 个空（错误 ' + wrongCountCurrentSentence + ' / 3 次）。';
            feedbackEl.className = 'feedback incorrect';
            nextBtn.disabled = true;
          }
        }
      }
    });

    redoBtn.addEventListener('click', function() {
      if (exerciseMode === 'voice') {
        voiceTranscriptEl.value = '';
        wrongCountCurrentSentence = 0;
      }
      if (exerciseMode === 'blanks') {
        var inputs = sentenceContainer.querySelectorAll('.blank-input');
        inputs.forEach(function(input) {
          input.value = '';
          input.classList.remove('correct', 'incorrect');
        });
      }
      feedbackEl.textContent = '';
      feedbackEl.className = 'feedback';
      nextBtn.disabled = true;
      wrongCountCurrentSentence = 0;
    });

    nextBtn.addEventListener('click', function() {
      const group = getCurrentGroup();
      const total = group.sentences.length;
      if (currentSentenceIndex < total - 1) {
        currentSentenceIndex++;
        updateProgress();
        resetSentenceView();
      } else {
        feedbackEl.textContent = '🎉 已完成本组所有句子！';
        feedbackEl.className = 'feedback correct';
        nextBtn.disabled = true;
        showResultsModal();
      }
    });

    pauseToggle.addEventListener('click', function() {
      audioEl.pause();
      pauseOverlay.style.display = 'flex';
    });

    resumeBtn.addEventListener('click', function() {
      pauseOverlay.style.display = 'none';
      audioEl.play().catch(function() {});
    });

    // 每次音频开始播放后，允许选择「语音输入」或「填空」
    audioEl.addEventListener('play', function() {
      hasPlayedSinceReset = true;
      voiceBtn.disabled = false;
      blanksBtn.disabled = false;
    });

    // 音频加载失败时提示（如文件不存在或路径错误）
    audioEl.addEventListener('error', function() {
      const group = getCurrentGroup();
      feedbackEl.textContent = '无法加载音频：「' + group.id + '.mp3」。请确认该文件与 test.html 在同一目录下。';
      feedbackEl.className = 'feedback incorrect';
    });

    function applyCurrentGroup() {
      const group = getCurrentGroup();
      // 音频文件名为分组 id：A1.mp3, A2.mp3, B7.mp3, ...
      audioEl.src = encodeURI(group.id + '.mp3');
      audioEl.load();
      currentSentenceIndex = 0;
      groupSessionAttempted = 0;
      groupSessionCorrect = 0;
      updateProgress();
      resetSentenceView();
    }

    /** 本组练习结果弹窗：正确率 + 本组错题记录 */
    function showResultsModal() {
      const group = getCurrentGroup();
      const overlay = document.getElementById('results-overlay');
      const titleEl = document.getElementById('results-title');
      const statsEl = document.getElementById('results-stats');
      const errorsListEl = document.getElementById('results-errors-list');

      titleEl.textContent = group.label + ' - 练习结果';
      const total = groupSessionAttempted;
      const correct = groupSessionCorrect;
      const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
      statsEl.textContent = '正确率：' + correct + ' / ' + total + '（' + pct + '%）';

      const groupErrors = errorBook.filter(function(item) { return item.groupId === group.id; });
      if (groupErrors.length === 0) {
        errorsListEl.innerHTML = '<p style="color:#6b7280;margin:0;">本组暂无错题记录。</p>';
      } else {
        errorsListEl.innerHTML = groupErrors.map(function(item) {
          return '<div class="error-item"><div class="error-meta">' + item.groupLabel + ' · 第 ' + item.sentenceIndex + ' 句</div>' + item.sentenceText + '</div>';
        }).join('');
      }

      overlay.style.display = 'flex';
    }

    document.getElementById('results-close-btn').addEventListener('click', function() {
      document.getElementById('results-overlay').style.display = 'none';
    });

    // 初始化
    renderGroupButtons();
    applyCurrentGroup();
  </script>
</body>
</html>
